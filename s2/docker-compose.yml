services:
  postgres:
    image: postgres:15
    container_name: autoservice-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: autoservice    
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d
    networks:
      - autoservice_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d autoservice"]  
      interval: 10s
      timeout: 5s
      retries: 5

  flyway:
    image: flyway/flyway:latest
    container_name: autoservice-flyway
    command: -url=jdbc:postgresql://postgres:5432/autoservice -user=admin -password=admin migrate
    volumes:
      - ./migrations:/flyway/sql
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - autoservice_net

volumes:
  postgres_data:

networks:
  autoservice_net:
    driver: bridge